<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Daily Briefings</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="app.webmanifest" />
  <meta name="theme-color" content="#c96442" />
  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Briefings" />
</head>
<body>
  <header class="topbar">
    <h1>&#9632; Daily Briefings</h1>
    <nav class="nav">
      <a href="index.html" class="active">feed</a>
      <a href="settings.html">settings</a>
    </nav>
    <input id="search" type="search" placeholder="filter briefings&hellip;" autocomplete="off" />
  </header>

  <main class="layout">
    <nav id="list" class="list" aria-label="Briefings">
      <p class="muted">Loading&hellip;</p>
    </nav>

    <article id="reader" class="reader">
      <p class="muted">Select a briefing.</p>
    </article>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="app.js"></script>
  <script src="pwa.js"></script>
</body>
</html>
